<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Equilibrio — dashboard familiare per monitorare l'equilibrio delle attività quotidiane." />
    <meta name="theme-color" content="#10201a" />

    <!-- Installabilità su Safari iOS ("Aggiungi a Home"): iOS ignora alcuni
         campi del web manifest, servono questi meta tag dedicati. La splash
         screen su iOS è generata automaticamente da Safari a partire da
         apple-touch-icon + theme-color + background_color del manifest;
         niente immagini di splash dedicate necessarie per un'app di questa
         semplicità. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Equilibrio" />

    <title>Equilibrio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
